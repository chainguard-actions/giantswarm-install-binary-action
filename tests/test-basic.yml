name: Test basic binary installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          binary: yq
          version: "4.44.3"
          download_url: "https://github.com/mikefarah/yq/releases/download/v${version}/${binary}_linux_amd64"
          smoke_test: "${binary} --version"
      - name: Assert binary is installed and executable
        run: |
          echo "Checking yq is installed..."
          if ! command -v yq &>/dev/null; then
            echo "FAIL: yq binary not found in PATH"
            exit 1
          fi
          echo "yq found at: $(which yq)"
          echo "Version output:"
          yq --version
          echo "PASS"
