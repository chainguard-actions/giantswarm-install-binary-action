name: Test basic binary installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          binary: architect
          version: "6.18.0"
          download_url: "https://github.com/giantswarm/architect/releases/download/v6.18.0/architect-v6.18.0-linux-amd64.tar.gz"
          tarball_binary_path: "*/architect"
          smoke_test: "architect version"
      - name: Assert binary is installed and executable
        run: |
          echo "Checking architect binary..."
          if ! command -v architect &>/dev/null; then
            echo "FAIL: architect binary not found in PATH"
            exit 1
          fi
          echo "PASS: architect binary found"
          architect version
          echo "PASS: smoke test passed"
