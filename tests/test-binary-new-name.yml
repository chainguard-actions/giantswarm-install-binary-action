name: Test binary installation with custom name
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          binary: yq
          version: "4.44.3"
          download_url: "https://github.com/mikefarah/yq/releases/download/v${version}/yq_linux_amd64.tar.gz"
          tarball_binary_path: "./yq_linux_amd64"
          binary_new_name: "yq-renamed"
          smoke_test: "yq-renamed --version"
      - name: Assert renamed binary is installed and executable
        run: |
          echo "Checking yq-renamed is available in PATH..."
          which yq-renamed || { echo "FAIL: yq-renamed not found in PATH"; exit 1; }
          yq-renamed --version || { echo "FAIL: yq-renamed --version failed"; exit 1; }
          echo "PASS"
