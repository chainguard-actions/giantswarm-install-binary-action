name: Test binary installation with custom name
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          binary: yq
          version: "4.44.3"
          download_url: "https://github.com/mikefarah/yq/releases/download/v${version}/${binary}_linux_amd64"
          smoke_test: "yaml-tool --version"
          binary_new_name: yaml-tool
      - name: Assert binary is installed under new name
        run: |
          echo "Checking yaml-tool is installed (renamed from yq)..."
          if ! command -v yaml-tool &>/dev/null; then
            echo "FAIL: yaml-tool binary not found in PATH"
            exit 1
          fi
          echo "yaml-tool found at: $(which yaml-tool)"
          echo "Version output:"
          yaml-tool --version
          echo "PASS: binary installed and accessible as yaml-tool"
      - name: Assert original name is not in PATH
        run: |
          echo "Checking yq is NOT installed under original name..."
          if command -v yq &>/dev/null; then
            echo "NOTE: yq also exists in PATH (may be pre-installed), but yaml-tool is the renamed binary"
          fi
          echo "PASS"
