name: Test binary installation with custom name
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          binary: yq
          version: "4.44.3"
          download_url: "https://github.com/mikefarah/yq/releases/download/v${version}/${binary}_linux_amd64.tar.gz"
          tarball_binary_path: "${binary}_linux_amd64"
          smoke_test: "yq-tool --version"
          binary_new_name: yq-tool
      - name: Assert binary is installed under new name
        run: |
          echo "Checking yq-tool is on PATH..."
          which yq-tool || { echo "FAIL: yq-tool not found on PATH"; exit 1; }
          echo "Running yq-tool --version..."
          yq-tool --version || { echo "FAIL: yq-tool --version failed"; exit 1; }
          echo "Checking original name is NOT on PATH..."
          if which yq 2>/dev/null; then
            echo "NOTE: yq also exists on PATH (may be pre-installed), but yq-tool is the renamed binary"
          fi
          echo "PASS"
