name: Test binary_new_name input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          binary: jq
          version: "1.6"
          download_url: "https://github.com/stedolan/jq/releases/download/jq-${version}/${binary}-linux64"
          smoke_test: "${binary_new_name} --version"
          binary_new_name: myjq
      - name: Assert renamed binary is installed and executable
        run: |
          echo "Checking myjq is available in PATH"
          which myjq || { echo "FAIL: myjq not found in PATH"; exit 1; }
          echo "Running myjq --version"
          myjq --version || { echo "FAIL: myjq --version failed"; exit 1; }
          echo "PASS"
